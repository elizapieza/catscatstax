<body style = "background-color: violet;">  <!-- for current page only, changes BACKGROUND COLOR-->
    <!--
    1. inline <-- target line by line
    2. internal <-- target all lines in page
    3. external <-- this is the best way to do it. applies to all pages in design
-->
    <h1 style= "color: black"> Class Exercise with inline CSS</h1> <!-- changes TEXT COLOR for h1-->
    <p style=" background-color: grey; color: white;"> This is a paragraph</p> <!-- Block around P, changes background and font, Changes this P only-->
    <p> This is another paragraph</p>
    <p> This is a third paragraph</p>
    <p> This is a fourth paragraph</p>
</body>
